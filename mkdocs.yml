site_name: Lunar Tear Installation Guide

theme:
  name: material

  palette:
    - scheme: slate
      primary: black
      accent: white

  features:
    - navigation.instant
    - navigation.sections
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Tailscale Setup: tailscale-setup.md

plugins:
  - search
  - git-revision-date-localized